name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: 🧪 Refinery Quality Check
        uses: sircesarium/refinery-rs/ci@main
        with:
          enable-sweet: "true"
          enable-clippy: "true"
          enable-fmt: "true"
          sweet-threshold: "."
